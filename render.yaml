services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: rbot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PRIMARY_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      # REDIS_URL not needed — tasks run in-process via daemon threads (see celery_app.py)
