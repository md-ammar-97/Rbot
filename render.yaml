services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: rbot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PRIMARY_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      # REDIS_URL not needed — tasks run in-process via daemon threads (see celery_app.py)

  # ── Job Discovery Cron ───────────────────────────────────────────────────────
  - type: cron
    name: rbot-discovery-cron
    runtime: python
    rootDir: backend
    buildCommand: pip install requests
    schedule: "0 */4 * * *"
    startCommand: >
      python -c "
      import os, requests, sys;
      r = requests.post(
        os.environ.get('API_URL', 'https://rbot-api.onrender.com') + '/internal/discovery/run',
        headers={'X-Internal-Key': os.environ.get('INTERNAL_API_KEY', '')},
        timeout=10
      );
      print(r.status_code, r.text);
      sys.exit(0 if r.status_code == 200 else 1)"
    envVars:
      - key: API_URL
        value: https://rbot-api.onrender.com
      - key: INTERNAL_API_KEY
        sync: false
