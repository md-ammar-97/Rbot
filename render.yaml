services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: rbot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PRIMARY_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: rbot-redis
          property: connectionString

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  - type: worker
    name: rbot-celery
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: >
      celery -A app.workers.celery_app worker --loglevel=info
      -Q ingestion,profile,recovery,discovery,scoring,drafting -c 4
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PRIMARY_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: rbot-redis
          property: connectionString

  # ── n8n Workflow Automation (self-hosted) ────────────────────────────────────
  - type: web
    name: rbot-n8n
    runtime: docker
    rootDir: n8n
    dockerfilePath: ./Dockerfile
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_PORT
        value: "5678"
      - key: WEBHOOK_URL
        sync: false        # set to https://rbot-n8n.onrender.com after first deploy
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false        # pick any username
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false        # pick a strong password
      - key: RBOT_API_URL
        sync: false        # https://rbot-api.onrender.com after API is deployed
      - key: INTERNAL_API_KEY
        sync: false        # same value as backend INTERNAL_API_KEY
      - key: N8N_ENCRYPTION_KEY
        sync: false        # any random 32-char string for encrypting credentials

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: rbot-redis
    plan: free
    ipAllowList: []   # empty = accessible only from services within this Render account
