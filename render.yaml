services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: rbot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PRIMARY_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: rbot-redis
          property: connectionString

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  - type: worker
    name: rbot-celery
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      celery -A app.workers.celery_app worker --loglevel=info
      -Q ingestion,profile,recovery,discovery,scoring,drafting -c 2
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PRIMARY_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: rbot-redis
          property: connectionString

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: rbot-redis
    plan: free
    ipAllowList: []   # empty = accessible only from services within this Render account
